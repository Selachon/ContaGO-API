# Render Blueprint for ContaGO API
# Deploy via: https://dashboard.render.com/blueprints

services:
  - type: web
    name: contago-api
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: CORS_ORIGIN
        sync: false # Set manually: https://contago.com.co,https://www.contago.com.co
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        sync: false
    # Render includes Chromium for Puppeteer automatically
    # See: https://render.com/docs/puppeteer
